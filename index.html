<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: #cae1cc;
        }

        .card-box {
            background: rgb(238, 234, 234);
            padding: 40px;
            width: 690px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            text-align: center;
        }
    </style>

    <py-config>
        packages = ["numpy", "matplotlib"]
    </py-config>
</head>

<body>

<div class="card-box">

    <h3 class="mb-4 fw-bold">Attendance Tracker</h3>

    <select id="days" class="form-control mb-2">
        <option value="0">Monday</option>
        <option value="1">Tuesday</option>
        <option value="2">Wednesday</option>
        <option value="3">Thursday</option>
        <option value="4">Friday</option>
    </select>

    <input type="number" id="absences" class="form-control mb-3" placeholder="Enter Absences">
    <button class="btn btn-danger w-100 mb-3" py-click="update_graph">Show in Graph</button>

    <div id="output"></div>

</div>

<script type="py" src="main.py"></script>

</body>
</html>
